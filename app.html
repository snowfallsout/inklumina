<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Colorfield — Offline Demo (Virtual Socket, No State)</title>
<style>
  :root { --bg:#071021; --panel:#0f1724; --muted:#9aa4b2; --accent:#7b61ff; color-scheme: dark; }
  html,body{height:100%;margin:0;font-family:system-ui,Segoe UI,Roboto,"Noto Sans",Arial;background:var(--bg);color:#eaf0ff}
  .app{display:flex;gap:12px;height:100vh;padding:12px;box-sizing:border-box}
  .left{flex:1;background:linear-gradient(180deg,#07101a,#071422);border-radius:8px;overflow:hidden;position:relative}
  canvas{width:100%;height:100%;display:block;cursor:grab}
  .right{width:340px;background:linear-gradient(180deg,#0b1224,#0e1730);border-radius:8px;padding:14px;box-sizing:border-box;display:flex;flex-direction:column;gap:10px}
  h1{margin:0;font-size:17px}
  .small{color:var(--muted);font-size:13px}
  select,button{width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit}
  button.primary{background:linear-gradient(90deg,var(--accent),#ff6b6b);border:none;color:#fff;font-weight:700;cursor:pointer}
  .meta{display:flex;gap:8px;align-items:center;justify-content:space-between}
  .info{font-size:13px;color:var(--muted)}
  .overlay{text-align:center;position:absolute;left:12px;top:12px;padding:6px 10px;background:rgba(0,0,0,0.35);border-radius:999px;border:1px solid rgba(255,255,255,0.04);color:#dfe6ff;font-size:13px}
  .hint{font-size:12px;color:var(--muted)}
  .row{display:flex;gap:8px}
  .tiny{padding:6px 8px;font-size:13px}
</style>
</head>
<body>
<div class="app">
  <div class="left" id="stage">
    <canvas id="canvas" aria-label="Particle display"></canvas>
    <div class="overlay">Offline virtual-socket demo — no saving</div>
  </div>

  <div class="right">
    <div>
      <h1>Colorfield — 虛擬 Socket Demo</h1>
      <div class="small">提交後不會記錄任何 state。只在頁面內模擬 socket 事件以觸發粒子與暫時文字顯示。</div>
    </div>

    <div>
      <label class="small">選擇 MBTI</label>
      <select id="mbtiSelect" aria-label="MBTI select"></select>
    </div>

    <div class="row">
      <button id="submitBtn" class="primary">提交並觸發粒子</button>
      <button id="clearBtn" class="tiny">清除粒子</button>
    </div>

    <div>
      <p class="hint">相機控制：拖曳平移，滑鼠滾輪縮放，點擊畫布亦可在點擊位置產生粒子。</p>
      <p class="hint">建議：在同一台電腦開兩個分頁以模擬 display 與 mobile（兩者都是本地單機，不同步）。</p>
    </div>
  </div>
</div>

<script>
/* ===== MBTI data (copied from server) ===== */
const MBTI_COLORS = {
  INTJ:'#4B0082', INTP:'#6495ED', ENTJ:'#FF4500', ENTP:'#FF00FF',
  INFJ:'#00A86B', INFP:'#DA70D6', ENFJ:'#FC913A', ENFP:'#92FE9D',
  ISTJ:'#95A5A6', ISFJ:'#BDB76B', ESTJ:'#4682B4', ESFJ:'#FFB6C1',
  ISTP:'#4A4A4A', ISFP:'#00CED1', ESTP:'#FF2400', ESFP:'#7B68EE'
};
const MBTI_NAMES = {
  INTJ:'战略家', INTP:'逻辑学家', ENTJ:'指挥官', ENTP:'辩论家',
  INFJ:'提倡者', INFP:'调停者', ENFJ:'主人公', ENFP:'竞选者',
  ISTJ:'检察官', ISFJ:'守护者', ESTJ:'总经理', ESFJ:'执政官',
  ISTP:'鉴赏家', ISFP:'探险家', ESTP:'企业家', ESFP:'表演者'
};
const MBTI_LUCKY_PHRASES = {
  INTJ:'深邃星河', INTP:'量子涟漪', ENTJ:'赤焰烈炬', ENTP:'橙光裂变',
  INFJ:'紫境幽光', INFP:'蔷薇共鸣', ENFJ:'黄金旋律', ENFP:'荧光奇境',
  ISTJ:'蓝海稳浪', ISFJ:'碧玉守护', ESTJ:'烈红征途', ESFJ:'樱粉温暖',
  ISTP:'银弦孤鸣', ISFP:'兰紫自由', ESTP:'电光闪耀', ESFP:'霓虹盛放'
};

/* ===== Virtual socket (in-memory, no persistence) ===== */
function createVirtualSocket() {
  const handlers = {};
  return {
    on(ev, cb){ (handlers[ev]||(handlers[ev]=[])).push(cb); },
    emit(ev, data){ (handlers[ev]||[]).slice().forEach(fn => { try{ fn(data); }catch(e){} }); }
  };
}
const socket = createVirtualSocket();

/* ===== UI wiring ===== */
const mbtiSelect = document.getElementById('mbtiSelect');
const submitBtn = document.getElementById('submitBtn');
const clearBtn = document.getElementById('clearBtn');

Object.keys(MBTI_COLORS).forEach(k=>{
  const o = document.createElement('option'); o.value=k; o.textContent=`${k} — ${MBTI_NAMES[k]}`; mbtiSelect.appendChild(o);
});

/* ===== Canvas + camera + particles ===== */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
let DPR = Math.min(2, window.devicePixelRatio || 1);

function resize(){
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.max(300, Math.floor(rect.width * DPR));
  canvas.height = Math.max(200, Math.floor(rect.height * DPR));
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
resize();

/* camera */
let cam = { x:0, y:0, z:1 }; // z = scale
let isPanning=false, lastPan=null;
canvas.addEventListener('mousedown', (e)=>{ isPanning=true; canvas.style.cursor='grabbing'; lastPan=[e.clientX,e.clientY]; });
window.addEventListener('mouseup', ()=>{ isPanning=false; canvas.style.cursor='grab'; lastPan=null; });
window.addEventListener('mousemove', (e)=>{
  if(isPanning && lastPan){
    const dx = (e.clientX - lastPan[0]) / cam.z;
    const dy = (e.clientY - lastPan[1]) / cam.z;
    cam.x += dx; cam.y += dy;
    lastPan=[e.clientX,e.clientY];
  }
});
canvas.addEventListener('wheel', (e)=>{
  e.preventDefault();
  const delta = -e.deltaY;
  const scaleFactor = (delta>0)?1.08:0.92;
  // zoom around cursor
  const rect = canvas.getBoundingClientRect();
  const cx = (e.clientX - rect.left);
  const cy = (e.clientY - rect.top);
  // world coords before zoom
  const wx = (cx - cam.x) / cam.z;
  const wy = (cy - cam.y) / cam.z;
  cam.z *= scaleFactor;
  // adjust cam.x,y so zoom centers at cursor
  cam.x = cx - wx * cam.z;
  cam.y = cy - wy * cam.z;
}, { passive:false });

/* particles */
let particles = [];
function spawnParticles(x,y,color,count=28){
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 0.6 + Math.random()*3.5;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed - (Math.random()*1.5),
      size:1+Math.random()*6,
      life:50 + Math.random()*80,
      color
    });
  }
}
canvas.addEventListener('click', (e)=>{
  // convert screen coords to world coords
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left);
  const sy = (e.clientY - rect.top);
  const wx = (sx - cam.x) / cam.z;
  const wy = (sy - cam.y) / cam.z;
  // emit a virtual submit event as if from a client
  socket.emit('submit_mbti', { mbti: mbtiSelect.value, x: wx, y: wy });
});

/* display overlay text (short-lived) */
let flashes = [];
function flash(text, ttl=120){ flashes.push({text,ttl}); if(flashes.length>3) flashes.shift(); }

/* animation loop */
function step(){
  // draw background (solid for performance)
  ctx.fillStyle = '#071021';
  ctx.fillRect(0,0, canvas.clientWidth, canvas.clientHeight);

  // apply camera transform
  ctx.save();
  ctx.translate(cam.x, cam.y);
  ctx.scale(cam.z, cam.z);

  // fade rectangle for trails
  ctx.fillStyle = 'rgba(6,10,20,0.12)';
  ctx.fillRect(-cam.x/cam.z, -cam.y/cam.z, canvas.width/cam.z + 50, canvas.height/cam.z + 50);

  // update and draw particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.vy += 0.02; // gravity
    p.x += p.vx; p.y += p.vy;
    p.life -= 1;
    if(p.life<=0){ particles.splice(i,1); continue; }
    const alpha = Math.max(0, p.life/120);
    ctx.fillStyle = hexToRgba(p.color, alpha);
    ctx.beginPath();
    ctx.arc(p.x,p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();

  // draw flashes (HUD, not affected by camera)
  if(flashes.length){
    ctx.save();
    ctx.resetTransform();
    ctx.textAlign = 'center';
    ctx.font = '22px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.fillText(flashes[flashes.length-1].text, canvas.clientWidth/2, 60);
    ctx.restore();
    for(let f of flashes) f.ttl--;
    flashes = flashes.filter(f=>f.ttl>0);
  }

  requestAnimationFrame(step);
}
requestAnimationFrame(step);

function hexToRgba(hex,a=1){
  const c = hex.replace('#','');
  const n = parseInt((c.length===3?c.split('').map(ch=>ch+ch).join(''):c),16);
  const r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  return `rgba(${r},${g},${b},${a})`;
}

/* ===== virtual socket listeners: display side ===== */
/* On 'submit_mbti' we spawn particles and flash short text.
   The event payload is { mbti, x, y } where x,y are world coords (optional).
*/
socket.on('submit_mbti', (data)=>{
  const mbti = (data.mbti||'').toUpperCase();
  if(!MBTI_COLORS[mbti]) return;
  const color = MBTI_COLORS[mbti];
  // if coordinates provided, use them; otherwise center of visible canvas
  let wx = data.x, wy = data.y;
  if(typeof wx !== 'number' || typeof wy !== 'number'){
    // center in world coords
    const cx = canvas.clientWidth/2, cy = 120;
    wx = (cx - cam.x) / cam.z;
    wy = (cy - cam.y) / cam.z;
  }
  spawnParticles(wx, wy, color, 90);
  flash(`${mbti} · ${MBTI_NAMES[mbti]} — ${MBTI_LUCKY_PHRASES[mbti]}`, 140);
});

/* ===== UI submit: emits virtual socket event (no storage) ===== */
submitBtn.addEventListener('click', ()=>{
  socket.emit('submit_mbti', { mbti: mbtiSelect.value });
});
clearBtn.addEventListener('click', ()=>{ particles.length = 0; flashes.length = 0; });

/* keyboard */
document.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') submitBtn.click(); });

/* initial camera fit */
(function initCamera(){
  // center camera so world origin roughly center of screen
  const rect = canvas.getBoundingClientRect();
  cam.x = rect.width / 2;
  cam.y = rect.height / 2;
  cam.z = Math.min(1.0, Math.max(0.6, (rect.width / 1000)));
})();

/* ensure canvas has client dims for initial resize */
setTimeout(resize, 50);
</script>
</body>
</html>
