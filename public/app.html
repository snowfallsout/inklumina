<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Colorfield Offline Demo</title>
  <style>
    :root {
      --bg: #0f1221;
      --panel: #171a2e;
      --panel-2: #202542;
      --text: #eef0ff;
      --muted: #a7add3;
      --accent: #7d87ff;
      --border: rgba(255, 255, 255, 0.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; background: radial-gradient(circle at 20% 0%, #1b2140 0%, var(--bg) 45%); color: var(--text); }

    .layout { min-height: 100%; display: grid; grid-template-columns: minmax(300px, 1fr) minmax(300px, 420px); }

    .stage { position: relative; min-height: 55vh; border-right: 1px solid var(--border); }
    #canvas { width: 100%; height: 100%; display: block; cursor: crosshair; }
    .stage-tip { position: absolute; left: 12px; bottom: 12px; font-size: 12px; color: #d5d9ff; background: rgba(0, 0, 0, 0.35); border: 1px solid var(--border); border-radius: 999px; padding: 6px 10px; }

    .panel { padding: 18px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: linear-gradient(180deg, var(--panel), var(--panel-2)); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
    h1 { margin: 0 0 6px; font-size: 20px; }
    .badge { display: inline-block; margin-bottom: 8px; background: rgba(125, 135, 255, 0.2); color: #dce0ff; border: 1px solid rgba(125, 135, 255, 0.5); border-radius: 999px; padding: 4px 10px; font-size: 12px; }
    p { margin: 4px 0; color: var(--muted); line-height: 1.45; }

    form { display: grid; gap: 10px; }
    label { font-size: 13px; color: #d6dbff; }
    select, button { width: 100%; border-radius: 10px; border: 1px solid var(--border); font-size: 15px; }
    select { background: #0e1330; color: var(--text); padding: 10px; }
    button { background: var(--accent); color: white; padding: 10px; font-weight: 700; cursor: pointer; }
    button:hover { filter: brightness(1.07); }
    button:focus-visible, select:focus-visible { outline: 2px solid #c7ccff; outline-offset: 2px; }

    .meta { display: flex; justify-content: space-between; align-items: center; gap: 10px; font-size: 14px; }
    .pill { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--border); border-radius: 999px; padding: 5px 10px; }
    .lucky { min-height: 24px; color: #ffe8b0; }

    .counts { max-height: 38vh; overflow: auto; }
    .row { display: grid; grid-template-columns: 62px 1fr auto; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px dashed rgba(255, 255, 255, 0.09); }
    .swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; border: 1px solid rgba(255,255,255,.5); vertical-align: middle; }
    .muted { color: var(--muted); }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .stage { min-height: 42vh; border-right: 0; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
  <main class="layout">
    <section class="stage" aria-label="Particle display area">
      <canvas id="canvas"></canvas>
      <div class="stage-tip">Click/tap canvas for fallback particle burst</div>
    </section>

    <aside class="panel">
      <section class="card">
        <span class="badge">Offline Demo</span>
        <h1>Colorfield — local single-file demo</h1>
        <p>No server/socket needed. Data stays in this browser via localStorage.</p>
        <p>Tip: open this <strong>same file</strong> in two tabs on one machine (display + mobile simulation).</p>
      </section>

      <section class="card">
        <form id="mbti-form">
          <label for="mbti-select">Select MBTI and submit (Enter supported)</label>
          <select id="mbti-select" required></select>
          <button id="submit-btn" type="submit">Submit MBTI</button>
        </form>
        <p id="lucky" class="lucky" aria-live="polite"></p>
      </section>

      <section class="card">
        <div class="meta">
          <strong>Total submissions</strong>
          <span class="pill" id="total">0</span>
        </div>
        <div id="counts" class="counts" aria-live="polite"></div>
      </section>
    </aside>
  </main>

  <script>
    'use strict';

    const MBTI_COLORS = {
      INTJ: '#4B0082', INTP: '#6495ED', ENTJ: '#FF4500', ENTP: '#FF00FF',
      INFJ: '#00A86B', INFP: '#DA70D6', ENFJ: '#FC913A', ENFP: '#92FE9D',
      ISTJ: '#95A5A6', ISFJ: '#BDB76B', ESTJ: '#4682B4', ESFJ: '#FFB6C1',
      ISTP: '#4A4A4A', ISFP: '#00CED1', ESTP: '#FF2400', ESFP: '#7B68EE',
    };

    const MBTI_NAMES = {
      INTJ: '战略家', INTP: '逻辑学家', ENTJ: '指挥官', ENTP: '辩论家',
      INFJ: '提倡者', INFP: '调停者', ENFJ: '主人公', ENFP: '竞选者',
      ISTJ: '检察官', ISFJ: '守护者', ESTJ: '总经理', ESFJ: '执政官',
      ISTP: '鉴赏家', ISFP: '探险家', ESTP: '企业家', ESFP: '表演者',
    };

    const MBTI_LUCKY_PHRASES = {
      INTJ: '深邃星河', INTP: '量子涟漪', ENTJ: '赤焰烈炬', ENTP: '橙光裂变',
      INFJ: '紫境幽光', INFP: '蔷薇共鸣', ENFJ: '黄金旋律', ENFP: '荧光奇境',
      ISTJ: '蓝海稳浪', ISFJ: '碧玉守护', ESTJ: '烈红征途', ESFJ: '樱粉温暖',
      ISTP: '银弦孤鸣', ISFP: '兰紫自由', ESTP: '电光闪耀', ESFP: '霓虹盛放',
    };

    const STORAGE_KEY = 'colorfield.offline.counts.v1';
    const MBTI_TYPES = Object.keys(MBTI_COLORS);

    const form = document.getElementById('mbti-form');
    const select = document.getElementById('mbti-select');
    const totalEl = document.getElementById('total');
    const countsEl = document.getElementById('counts');
    const luckyEl = document.getElementById('lucky');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let counts = loadCounts();
    let particles = [];

    setupSelect();
    resizeCanvas();
    renderCounts();
    requestAnimationFrame(tick);

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      submitMbti(select.value);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && document.activeElement !== document.getElementById('submit-btn')) {
        event.preventDefault();
        submitMbti(select.value);
      }
    });

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('storage', (e) => {
      if (e.key === STORAGE_KEY) {
        counts = loadCounts();
        renderCounts();
      }
    });

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      spawnBurst(e.clientX - rect.left, e.clientY - rect.top, MBTI_COLORS[select.value] || '#ffffff', 40);
    });

    function setupSelect() {
      const frag = document.createDocumentFragment();
      MBTI_TYPES.forEach((type) => {
        const option = document.createElement('option');
        option.value = type;
        option.textContent = `${type} · ${MBTI_NAMES[type]}`;
        frag.appendChild(option);
      });
      select.appendChild(frag);
    }

    function loadCounts() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        const normalized = {};
        MBTI_TYPES.forEach((type) => {
          const value = Number(parsed[type] || 0);
          normalized[type] = Number.isFinite(value) && value > 0 ? Math.floor(value) : 0;
        });
        return normalized;
      } catch (_) {
        return Object.fromEntries(MBTI_TYPES.map((type) => [type, 0]));
      }
    }

    function persistCounts() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(counts));
    }

    function submitMbti(mbti) {
      if (!MBTI_COLORS[mbti]) return;
      counts[mbti] = (counts[mbti] || 0) + 1;
      persistCounts();
      renderCounts();
      luckyEl.textContent = `${mbti} · ${MBTI_NAMES[mbti]} — ${MBTI_LUCKY_PHRASES[mbti]}`;
      spawnBurst(canvas.width * 0.5, canvas.height * 0.5, MBTI_COLORS[mbti], 90);
    }

    function renderCounts() {
      const total = MBTI_TYPES.reduce((sum, type) => sum + (counts[type] || 0), 0);
      totalEl.textContent = String(total);
      countsEl.innerHTML = MBTI_TYPES.map((type) => {
        const c = counts[type] || 0;
        return `<div class="row"><strong>${type}</strong><span class="muted"><span class="swatch" style="background:${MBTI_COLORS[type]}"></span>${MBTI_NAMES[type]}</span><span>${c}</span></div>`;
      }).join('');
    }

    function resizeCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function spawnBurst(x, y, color, count) {
      const maxParticles = 900;
      for (let i = 0; i < count; i++) {
        if (particles.length >= maxParticles) particles.shift();
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.5 + Math.random() * 2.8;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 1 + Math.random() * 3,
          life: 45 + Math.random() * 35,
          maxLife: 80,
          color,
        });
      }
    }

    function tick() {
      ctx.fillStyle = 'rgba(10, 12, 26, 0.24)';
      ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.01;
        p.vx *= 0.995;
        p.vy *= 0.995;
        p.life -= 1;

        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }

        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = hexToRgba(p.color, alpha);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(tick);
    }

    function hexToRgba(hex, alpha) {
      const raw = hex.replace('#', '');
      const full = raw.length === 3 ? raw.split('').map((c) => c + c).join('') : raw;
      const n = parseInt(full, 16);
      const r = (n >> 16) & 255;
      const g = (n >> 8) & 255;
      const b = n & 255;
      return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
    }
  </script>
</body>
</html>
