<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COLORFIELD — Live Particle Canvas</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #05050f;
  overflow: hidden;
  font-family: -apple-system, 'Segoe UI', sans-serif;
}

#video-bg {
  display: none;   /* camera is rendered directly into canvas each frame */
}

#canvas {
  position: fixed;
  inset: 0;
  z-index: 10;
}

/* ── UI overlay ─────────────────────────────────── */
#ui {
  position: fixed;
  inset: 0;
  z-index: 20;
  pointer-events: none;
}

/* Header */
#header {
  position: absolute;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  white-space: nowrap;
}
#header h1 {
  color: rgba(255,255,255,0.92);
  font-size: 30px;
  font-weight: 100;
  letter-spacing: 18px;
  text-transform: uppercase;
  text-shadow: 0 0 50px rgba(255,255,255,0.25);
}
#header p {
  color: rgba(255,255,255,0.28);
  font-size: 10px;
  letter-spacing: 5px;
  margin-top: 5px;
  text-transform: uppercase;
}

/* Legend panel */
#legend {
  position: absolute;
  right: 22px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(5,5,20,0.72);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  padding: 18px 14px;
  min-width: 158px;
}
#legend h3 {
  color: rgba(255,255,255,0.3);
  font-size: 9px;
  letter-spacing: 3px;
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.row {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 2.5px 0;
  opacity: 0.18;
  transform: translateX(6px);
  transition: opacity 0.4s, transform 0.4s;
}
.row.on { opacity: 1; transform: translateX(0); }

.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  filter: drop-shadow(0 0 4px var(--c));
}
.lbl {
  color: rgba(255,255,255,0.88);
  font-size: 11px;
  font-weight: 700;
  min-width: 34px;
}
.track {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}
.cnt {
  color: rgba(255,255,255,0.45);
  font-size: 10px;
  min-width: 16px;
  text-align: right;
}

/* Footer */
#footer {
  position: absolute;
  bottom: 26px;
  left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 30px;
}
#total-block {
  color: rgba(255,255,255,0.28);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
#total-block strong {
  color: rgba(255,255,255,0.85);
  font-size: 26px;
  font-weight: 100;
  letter-spacing: 6px;
  display: block;
  margin-top: 2px;
}
#join-block {
  text-align: right;
  color: rgba(255,255,255,0.32);
  font-size: 10px;
  letter-spacing: 2px;
  line-height: 1.9;
}
#join-block b {
  color: rgba(255,255,255,0.75);
  font-size: 13px;
  font-weight: 400;
  display: block;
  letter-spacing: 3px;
}

/* Emotion indicator */
#emotion-badge {
  position: absolute;
  top: 28px;
  left: 28px;
  color: rgba(255,255,255,0.25);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.5s;
}
#emotion-badge.smile { color: #FFD700; }
#emotion-badge.sad   { color: #6B8CFF; }

/* Toast */
.toast-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.toast-pill {
  display: inline-block;
  padding: 10px 28px;
  border-radius: 50px;
  background: rgba(5,5,20,0.75);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  color: white;
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 1px;
  animation: tIn .35s ease, tOut .35s 2.3s ease forwards;
  white-space: nowrap;
}
@keyframes tIn  { from { opacity:0; transform: scale(.85) translateY(8px); } to { opacity:1; transform: scale(1); } }
@keyframes tOut { to   { opacity:0; transform: scale(.9) translateY(-6px); } }

/* Waiting hint */
#waiting {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.18);
  font-size: 12px;
  letter-spacing: 3px;
  text-align: center;
  pointer-events: none;
  animation: breath 3s ease-in-out infinite;
}
@keyframes breath { 0%,100% { opacity:.18; } 50% { opacity:.45; } }

/* Session name indicator */
#session-name {
  position: absolute;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  margin-top: 58px;
  color: rgba(255,255,255,0.18);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  white-space: nowrap;
}

/* Session manager button */
#session-btn {
  position: absolute;
  bottom: 26px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 30px;
  color: rgba(255,255,255,0.4);
  font-size: 10px;
  letter-spacing: 2px;
  padding: 7px 18px;
  cursor: pointer;
  pointer-events: all;
  transition: background .2s, color .2s;
  text-transform: uppercase;
}
#session-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85); }

/* Session panel overlay */
#session-panel {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(3,3,12,0.88);
  backdrop-filter: blur(24px);
  pointer-events: all;
  align-items: center;
  justify-content: center;
}
#session-panel.open { display: flex; }

#session-box {
  background: rgba(10,10,30,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 36px 40px;
  width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  color: white;
}
#session-box h2 {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 28px;
}
.sp-new {
  display: flex;
  gap: 10px;
  margin-bottom: 32px;
}
.sp-new input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: white;
  font-size: 13px;
  padding: 10px 16px;
  outline: none;
  letter-spacing: 1px;
}
.sp-new input::placeholder { color: rgba(255,255,255,0.25); }
.sp-new input:focus { border-color: rgba(255,255,255,0.35); }
.sp-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  color: white;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 10px 20px;
  cursor: pointer;
  text-transform: uppercase;
  transition: background .15s;
  white-space: nowrap;
}
.sp-btn:hover { background: rgba(255,255,255,0.18); }
.sp-btn.danger { border-color: rgba(255,80,80,0.4); color: rgba(255,130,130,0.9); }
.sp-btn.danger:hover { background: rgba(255,50,50,0.2); }
#sp-history-title {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-bottom: 12px;
}
.sp-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.sp-row:last-child { border-bottom: none; }
.sp-row-info { flex: 1; }
.sp-row-name { font-size: 13px; color: rgba(255,255,255,0.85); }
.sp-row-meta { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; margin-top: 2px; }
#sp-close {
  position: absolute;
  top: 24px; right: 28px;
  font-size: 22px;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  pointer-events: all;
  line-height: 1;
}
#sp-close:hover { color: rgba(255,255,255,0.8); }
</style>
</head>
<body>

<video id="video-bg" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <div id="header">
    <h1>Colorfield</h1>
    <p>MBTI · Emotion · Particle Art</p>
  </div>

  <div id="emotion-badge">● FACE TRACKING</div>

  <div id="legend">
    <h3>Present</h3>
    <div id="legend-rows"></div>
  </div>

  <div id="footer">
    <div id="total-block">
      Participants
      <strong id="total-num">0</strong>
    </div>
    <div id="join-block">
      <b>SCAN TO JOIN</b>
      Phone → localhost:3000/mobile.html
    </div>
  </div>

  <div id="session-name"></div>
  <div id="waiting">Waiting for participants to join…</div>
  <button id="session-btn" onclick="openSessionPanel()">⊕ 新场次 / 历史</button>
</div>

<!-- Session manager panel -->
<div id="session-panel">
  <span id="sp-close" onclick="closeSessionPanel()">×</span>
  <div id="session-box">
    <h2>活动场次管理</h2>
    <div class="sp-new">
      <input id="sp-name-input" type="text" placeholder="新活动名称（可留空）" maxlength="30">
      <button class="sp-btn" onclick="createNewSession()">开始新场次</button>
    </div>
    <div id="sp-history-title">历史记录</div>
    <div id="sp-history-list">
      <div style="color:rgba(255,255,255,0.2);font-size:12px;padding:16px 0">暂无历史记录</div>
    </div>
  </div>
</div>

<!-- Socket.io & MediaPipe -->
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js" crossorigin="anonymous"></script>

<script>
'use strict';

// ── Constants ──────────────────────────────────────────────────────────────────
const TWO_PI = Math.PI * 2;

const MBTI_COLORS = {
  INTJ:'#9D4EDD', INTP:'#00F5FF', ENTJ:'#FF073A', ENTP:'#FF6B00',
  INFJ:'#CC00FF', INFP:'#FF1493', ENFJ:'#FFD700', ENFP:'#39FF14',
  ISTJ:'#1E90FF', ISFJ:'#00FFCD', ESTJ:'#FF4500', ESFJ:'#FF69B4',
  ISTP:'#B8C0FF', ISFP:'#E040FB', ESTP:'#FFE600', ESFP:'#FF6EC7',
};
const MBTI_NAMES = {
  INTJ:'战略家', INTP:'逻辑学家', ENTJ:'指挥官', ENTP:'辩论家',
  INFJ:'提倡者', INFP:'调停者', ENFJ:'主人公', ENFP:'竞选者',
  ISTJ:'检察官', ISFJ:'守护者', ESTJ:'总经理', ESFJ:'执政官',
  ISTP:'鉴赏家', ISFP:'探险家', ESTP:'企业家', ESFP:'表演者',
};
const MBTI_ORDER = [
  'INTJ','INTP','ENTJ','ENTP',
  'INFJ','INFP','ENFJ','ENFP',
  'ISTJ','ISFJ','ESTJ','ESFJ',
  'ISTP','ISFP','ESTP','ESFP',
];

// Per-MBTI multi-stop palettes for richer blob sprites
const MBTI_PALETTES = {
  INTJ: { core:'#C490FF', mid:'#9D4EDD', outer:'#5B2D8E', accent:'#3A1D5C' },
  INTP: { core:'#80FFFF', mid:'#00F5FF', outer:'#007A80', accent:'#003D40' },
  ENTJ: { core:'#FF6B6B', mid:'#FF073A', outer:'#9E0024', accent:'#4D0012' },
  ENTP: { core:'#FFAA55', mid:'#FF6B00', outer:'#A04400', accent:'#502200' },
  INFJ: { core:'#E680FF', mid:'#CC00FF', outer:'#7A009A', accent:'#3D004D' },
  INFP: { core:'#FF6BAD', mid:'#FF1493', outer:'#A00D5E', accent:'#50072F' },
  ENFJ: { core:'#FFEC80', mid:'#FFD700', outer:'#A08600', accent:'#504300' },
  ENFP: { core:'#80FF6B', mid:'#39FF14', outer:'#22A00D', accent:'#115007' },
  ISTJ: { core:'#6BB8FF', mid:'#1E90FF', outer:'#1260A0', accent:'#093050' },
  ISFJ: { core:'#66FFE0', mid:'#00FFCD', outer:'#00A080', accent:'#005040' },
  ESTJ: { core:'#FF8055', mid:'#FF4500', outer:'#A02C00', accent:'#501600' },
  ESFJ: { core:'#FFA0CC', mid:'#FF69B4', outer:'#A04272', accent:'#502139' },
  ISTP: { core:'#D4DAFF', mid:'#B8C0FF', outer:'#7078A0', accent:'#383C50' },
  ISFP: { core:'#EC80FF', mid:'#E040FB', outer:'#8C289A', accent:'#46144D' },
  ESTP: { core:'#FFF066', mid:'#FFE600', outer:'#A09000', accent:'#504800' },
  ESFP: { core:'#FFA0DA', mid:'#FF6EC7', outer:'#A0447C', accent:'#50223E' },
};

// ── Canvas ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Glow sprite cache ──────────────────────────────────────────────────────────
// Three sprite variants per MBTI type, pre-baked at startup:
//   dot   — bright core + halo (160×160)  — for 85% small particles
//   blob  — soft multi-stop gradient + procedural texture (256×256) — 12% medium
//   field — ultra-soft outer wash (320×320) — 3% large color fields
const spriteSetCache = new Map();  // mbti|color → { dot, blob, field }

const DOT_HALF   = 80;    // 160×160
const BLOB_HALF  = 128;   // 256×256
const FIELD_HALF = 160;   // 320×320
const DOT_REF_R  = 16;    // reference radius for dot sprite

function _makeCanvas(half) {
  const sz = half * 2;
  const c  = document.createElement('canvas');
  c.width = c.height = sz;
  return { canvas: c, ctx: c.getContext('2d'), cx: half, cy: half, sz };
}

// Dot sprite — white-hot core + single-color halo (original look)
function _makeDot(color) {
  const { canvas, ctx: g, cx, cy, sz } = _makeCanvas(DOT_HALF);

  // Outer glow
  const g1 = g.createRadialGradient(cx, cy, DOT_REF_R * .4, cx, cy, DOT_HALF);
  g1.addColorStop(0,  color + 'BB');
  g1.addColorStop(.5, color + '44');
  g1.addColorStop(1,  color + '00');
  g.fillStyle = g1;
  g.fillRect(0, 0, sz, sz);

  // Liquid-metal core
  const g2 = g.createRadialGradient(
    cx - DOT_REF_R * .28, cy - DOT_REF_R * .28, DOT_REF_R * .08,
    cx, cy, DOT_REF_R
  );
  g2.addColorStop(0,   'rgba(255,255,255,0.98)');
  g2.addColorStop(.22, color);
  g2.addColorStop(.72, color + 'BB');
  g2.addColorStop(1,   color + '00');
  g.beginPath();
  g.arc(cx, cy, DOT_REF_R, 0, TWO_PI);
  g.fillStyle = g2;
  g.fill();

  return { canvas, half: DOT_HALF, refR: DOT_REF_R };
}

// Blob sprite — soft multi-color gradient + procedural organic texture
function _makeBlob(palette) {
  const { canvas, ctx: g, cx, cy, sz } = _makeCanvas(BLOB_HALF);
  const R = BLOB_HALF * .85;  // main gradient radius

  // Multi-stop radial gradient using palette
  const grad = g.createRadialGradient(cx, cy, 0, cx, cy, R);
  grad.addColorStop(0,   palette.core + 'DD');
  grad.addColorStop(.25, palette.mid  + 'AA');
  grad.addColorStop(.55, palette.outer + '88');
  grad.addColorStop(.80, palette.accent + '44');
  grad.addColorStop(1,   palette.accent + '00');
  g.fillStyle = grad;
  g.beginPath();
  g.arc(cx, cy, R, 0, TWO_PI);
  g.fill();

  // Procedural texture: random translucent ellipses clipped to the blob shape
  g.globalCompositeOperation = 'source-atop';
  const nBlobs = 25 + Math.floor(Math.random() * 20);
  for (let i = 0; i < nBlobs; i++) {
    const bx = cx + (Math.random() - .5) * R * 1.4;
    const by = cy + (Math.random() - .5) * R * 1.4;
    const rx = 8 + Math.random() * R * .4;
    const ry = 8 + Math.random() * R * .4;
    const rot = Math.random() * TWO_PI;
    // Alternate between palette colors for richness
    const colors = [palette.core, palette.mid, palette.outer, palette.accent];
    g.fillStyle = colors[i % 4] + (Math.random() > .5 ? '44' : '28');
    g.save();
    g.translate(bx, by);
    g.rotate(rot);
    g.beginPath();
    g.ellipse(0, 0, rx, ry, 0, 0, TWO_PI);
    g.fill();
    g.restore();
  }
  g.globalCompositeOperation = 'source-over';

  return { canvas, half: BLOB_HALF, refR: BLOB_HALF * .35 };
}

// Field sprite — ultra-soft low-opacity wash
function _makeField(palette) {
  const { canvas, ctx: g, cx, cy, sz } = _makeCanvas(FIELD_HALF);
  const R = FIELD_HALF * .95;

  // Very soft gradient — fades out slowly
  const grad = g.createRadialGradient(cx, cy, 0, cx, cy, R);
  grad.addColorStop(0,   palette.mid  + '55');
  grad.addColorStop(.3,  palette.outer + '40');
  grad.addColorStop(.65, palette.accent + '22');
  grad.addColorStop(1,   palette.accent + '00');
  g.fillStyle = grad;
  g.beginPath();
  g.arc(cx, cy, R, 0, TWO_PI);
  g.fill();

  // Subtle procedural wisps
  g.globalCompositeOperation = 'source-atop';
  for (let i = 0; i < 12; i++) {
    const bx = cx + (Math.random() - .5) * R;
    const by = cy + (Math.random() - .5) * R;
    const r  = R * (.2 + Math.random() * .35);
    const gw = g.createRadialGradient(bx, by, 0, bx, by, r);
    const c  = i % 2 === 0 ? palette.core : palette.mid;
    gw.addColorStop(0, c + '20');
    gw.addColorStop(1, c + '00');
    g.fillStyle = gw;
    g.beginPath();
    g.arc(bx, by, r, 0, TWO_PI);
    g.fill();
  }
  g.globalCompositeOperation = 'source-over';

  return { canvas, half: FIELD_HALF, refR: FIELD_HALF * .25 };
}

function getSpriteSet(mbti) {
  if (spriteSetCache.has(mbti)) return spriteSetCache.get(mbti);
  const color   = MBTI_COLORS[mbti];
  const palette = MBTI_PALETTES[mbti] || { core: color, mid: color, outer: color, accent: color };
  const set = {
    dot:   _makeDot(color),
    blob:  _makeBlob(palette),
    field: _makeField(palette),
  };
  spriteSetCache.set(mbti, set);
  return set;
}

// Fallback for ambient particles (no MBTI type) — use dot sprite only
function getDotSprite(color) {
  const key = '__dot_' + color;
  if (spriteSetCache.has(key)) return spriteSetCache.get(key);
  const dot = _makeDot(color);
  const set = { dot, blob: dot, field: dot };
  spriteSetCache.set(key, set);
  return set;
}

// Pre-warm all 16 MBTI sprite sets + ambient colors
const AMBIENT_COLS = ['#9D4EDD','#00F5FF','#39FF14','#FFD700','#FF1493'];
MBTI_ORDER.forEach(m => getSpriteSet(m));
AMBIENT_COLS.forEach(c => getDotSprite(c));

// ── Particle class ─────────────────────────────────────────────────────────────
// Size-class parameters (refined for delicate look + wide size variance):
//   dot:   88% — tiny to small (1.5-8px), varied alpha, full trail
//   blob:   9% — medium soft blobs (12-30px), lower alpha, medium trail
//   field:  3% — large color fields (35-65px), very low alpha, short trail
const SIZE_CLASS_PARAMS = {
  dot:   { sizeMin:1.5, sizeMax:8,  alphaMin:.35, alphaMax:.95, speedCap:6,   drag:.992, accel:.45, trailMax:10 },
  blob:  { sizeMin:12,  sizeMax:30, alphaMin:.12, alphaMax:.30, speedCap:4,   drag:.986, accel:.20, trailMax:6  },
  field: { sizeMin:35,  sizeMax:65, alphaMin:.04, alphaMax:.12, speedCap:2,   drag:.978, accel:.08, trailMax:3  },
};

function pickSizeClass() {
  const r = Math.random();
  if (r < .03) return 'field';
  if (r < .12) return 'blob';
  return 'dot';
}

class Particle {
  constructor(x, y, color, mbtiType) {
    this.x  = x;  this.y  = y;
    this.color   = color;
    this.mbti    = mbtiType || null;

    // Size class determines visual variant + physics
    this.sizeClass = pickSizeClass();
    const p = SIZE_CLASS_PARAMS[this.sizeClass];

    this.vx = (Math.random() - .5) * (this.sizeClass === 'dot' ? 14 : 6);
    this.vy = (Math.random() - .5) * (this.sizeClass === 'dot' ? 14 : 6) - 2;
    this.size    = p.sizeMin + Math.random() * (p.sizeMax - p.sizeMin);
    this.alpha   = 0;
    this.alphaT  = p.alphaMin + Math.random() * (p.alphaMax - p.alphaMin);
    this.state   = 'born';
    this.age     = 0;
    this.trail   = [];
    this.orbitA  = Math.random() * TWO_PI;
    this.orbitR  = 55 + Math.random() * 90;
    this.orbitSpd= (.022 + Math.random() * .03) * (Math.random() > .5 ? 1 : -1);
    this.targetF = null;
    this.phaseOffset = Math.random() * TWO_PI;  // lifecycle pulse phase

    // Cache sprite set reference
    this._sprites = mbtiType ? getSpriteSet(mbtiType) : getDotSprite(color);
  }

  update(faces, emotion) {
    this.age++;
    this.alpha = Math.min(this.alphaT, this.alpha + .04);

    const p = SIZE_CLASS_PARAMS[this.sizeClass];

    // Trail
    if (p.trailMax > 0 && this.age % 2 === 0) {
      this.trail.push({ x: this.x, y: this.y, s: this.size });
      if (this.trail.length > p.trailMax) this.trail.shift();
    }

    // State machine — no falling: particles always stay on screen
    if (this.age < 20) {
      this.state = 'born';
    } else if (this.sizeClass === 'field') {
      this.state = 'free';
    } else {
      const nf  = nearestFace(faces, this.x, this.y);
      const d2  = nf ? dist2sq(this.x, this.y, nf.x, nf.y) : Infinity;

      if (nf && d2 < 260 * 260) {
        this.targetF = nf;
        this.state   = nf.smile ? 'swirling' : 'attracted';
      } else {
        this.state = 'free';
      }
    }

    switch (this.state) {
      case 'born':
      case 'free': {
        // Brownian drift
        this.vx += (Math.random() - .5) * p.accel;
        this.vy += (Math.random() - .5) * p.accel;

        // Gentle mutual attraction toward nearby same-color particles
        // (creates clusters of same MBTI type — living art)
        if (this.mbti && this.sizeClass === 'dot' && this.age % 4 === 0) {
          const siblings = mbtiParticles[this.mbti];
          if (siblings && siblings.length > 1) {
            // Pick a random sibling to drift toward
            const other = siblings[Math.floor(Math.random() * siblings.length)];
            if (other !== this) {
              const dx = other.x - this.x, dy = other.y - this.y;
              const d  = Math.sqrt(dx*dx + dy*dy) || 1;
              if (d > 30 && d < 350) {
                const pull = .012;
                this.vx += (dx / d) * pull;
                this.vy += (dy / d) * pull;
              }
            }
          }
        }

        // Soft center gravity — keeps particles from drifting to edges
        this.vx += (W * .5 - this.x) * .00003;
        this.vy += (H * .5 - this.y) * .00003;

        const cap2 = p.speedCap * p.speedCap;
        const sp2 = this.vx*this.vx + this.vy*this.vy;
        if (sp2 > cap2) { const inv = p.speedCap / Math.sqrt(sp2); this.vx *= inv; this.vy *= inv; }
        this.vx *= p.drag; this.vy *= p.drag;
        break;
      }
      case 'attracted': {
        const f  = this.targetF;
        const dx = f.x - this.x, dy = f.y - this.y;
        const d  = Math.sqrt(dx*dx + dy*dy) || 1;
        const ft = Math.min(2.2, 90 / d) * .085;
        this.vx += dx/d * ft; this.vy += dy/d * ft;
        this.vx *= .92; this.vy *= .92;
        break;
      }
      case 'swirling': {
        const f = this.targetF;
        this.orbitA += this.orbitSpd * 3.2;
        const tx = f.x + Math.cos(this.orbitA) * this.orbitR;
        const ty = f.y + Math.sin(this.orbitA) * this.orbitR;
        this.vx += (tx - this.x) * .16;
        this.vy += (ty - this.y) * .16;
        this.vx *= .78; this.vy *= .78;
        break;
      }
    }

    this.x += this.vx;
    this.y += this.vy;
    // Wrap around edges — particles never leave the canvas
    if (this.x < -20) this.x = W + 10;
    if (this.x > W + 20) this.x = -10;
    if (this.y < -20) this.y = H + 10;
    if (this.y > H + 20) this.y = -10;
  }

  draw(ctx) {
    // Pick the correct sprite variant for this size class
    const spriteEntry = this._sprites[this.sizeClass];
    const spr  = spriteEntry.canvas;
    const half = spriteEntry.half;
    const refR = spriteEntry.refR;

    // Lifecycle pulse — subtle alpha breathing
    const pulse = 1 + Math.sin(this.age * 0.018 + this.phaseOffset) * 0.2;
    const baseAlpha = this.alpha * pulse;

    // Trail — longer, more visible, creates flowing ribbon effect
    const tr = this.trail;
    for (let i = 1; i < tr.length; i++) {
      const t  = i / tr.length;
      const pt = tr[i];
      const hw = half * (pt.s / refR) * t * .7;
      if (hw < .5) continue;
      ctx.globalAlpha = t * baseAlpha * .45;
      ctx.drawImage(spr, pt.x - hw, pt.y - hw, hw * 2, hw * 2);
    }

    // Core sprite
    const hw = half * (this.size / refR);
    ctx.globalAlpha = baseAlpha;
    ctx.drawImage(spr, this.x - hw, this.y - hw, hw * 2, hw * 2);

    // Diamond sparkle — white rhombus star, more frequent
    if (this.sizeClass === 'dot' && Math.random() < .12) {
      drawDiamondSparkle(ctx, this.x, this.y, this.size, baseAlpha);
    }

    ctx.globalAlpha = 1;
  }
}

// White diamond/rhombus sparkle with 4-pointed star rays
function drawDiamondSparkle(ctx, x, y, size, alpha) {
  const s = size * (2.5 + Math.random() * 2);  // long rays
  const d = s * .22;                             // short rays (diamond shape)
  ctx.globalAlpha = alpha * (.3 + Math.random() * .4);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth   = .6;
  ctx.beginPath();
  // Vertical + horizontal long rays
  ctx.moveTo(x, y - s);  ctx.lineTo(x, y + s);
  ctx.moveTo(x - s, y);  ctx.lineTo(x + s, y);
  // Diagonal short rays (creates diamond effect)
  ctx.moveTo(x - d, y - d); ctx.lineTo(x + d, y + d);
  ctx.moveTo(x + d, y - d); ctx.lineTo(x - d, y + d);
  ctx.stroke();
  // Bright center dot
  ctx.globalAlpha = alpha * .6;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x, y, .8, 0, TWO_PI);
  ctx.fill();
}

// Squared distance — avoids sqrt in the hot path
function dist2sq(ax, ay, bx, by) {
  const dx = ax-bx, dy = ay-by;
  return dx*dx + dy*dy;
}

function nearestFace(faces, px, py) {
  if (!faces.length) return null;
  let best = null, bd = Infinity;
  for (const f of faces) {
    const d = dist2sq(px, py, f.x, f.y);
    if (d < bd) { bd = d; best = f; }
  }
  return best;
}

// ── Particle pool ──────────────────────────────────────────────────────────────
// Design: every MBTI type stays visible forever.
//   - Each type gets a quota = proportional slice of MAX_MBTI_PARTICLES
//     (at least MIN_PER_TYPE, at most MAX_PER_TYPE).
//   - When over quota for a type, oldest of that type is pruned.
//   - Ambient drifters occupy a separate, fixed budget.
const particles        = [];        // all live particles
const mbtiParticles    = {};        // mbti → Particle[]  (index for fast pruning)
const MAX_MBTI_TOTAL   = 800;       // budget shared across all MBTI types
const MIN_PER_TYPE     = 20;        // guaranteed floor so early joiners stay visible
const MAX_PER_TYPE     = 120;       // hard ceiling per type
const SPAWN_PER_JOIN   = 18;        // particles spawned when someone joins (fewer = more delicate)

function quotaForType(mbti) {
  // Total MBTI participants across all types
  const total = Object.values(mbtiCounts).reduce((a, b) => a + b, 0) || 1;
  const count = mbtiCounts[mbti] || 1;
  const raw   = Math.floor((count / total) * MAX_MBTI_TOTAL);
  return Math.max(MIN_PER_TYPE, Math.min(MAX_PER_TYPE, raw));
}

function pruneType(mbti) {
  const arr = mbtiParticles[mbti];
  if (!arr) return;
  const quota = quotaForType(mbti);
  while (arr.length > quota) {
    const p = arr.shift();               // remove oldest of this type
    const idx = particles.indexOf(p);
    if (idx !== -1) particles.splice(idx, 1);
  }
}

function pruneAllTypes() {
  for (const mbti of Object.keys(mbtiParticles)) pruneType(mbti);
}

function spawnMBTI(mbti, color) {
  if (!mbtiParticles[mbti]) mbtiParticles[mbti] = [];

  const side = Math.floor(Math.random() * 4);
  let bx, by;
  switch (side) {
    case 0: bx = Math.random()*W;  by = -20;    break;
    case 1: bx = W+20;             by = Math.random()*H; break;
    case 2: bx = Math.random()*W;  by = H+20;   break;
    case 3: bx = -20;              by = Math.random()*H; break;
  }

  for (let i = 0; i < SPAWN_PER_JOIN; i++) {
    const p = new Particle(
      bx + (Math.random() - .5) * 60,
      by + (Math.random() - .5) * 60,
      color,
      mbti
    );
    particles.push(p);
    mbtiParticles[mbti].push(p);
  }

  // Re-balance: quota shrank for others because this type's share grew
  pruneAllTypes();
}

// ── Face detection (MediaPipe FaceMesh) ───────────────────────────────────────
let faces   = [];
let emotion = 'neutral';
const video = document.getElementById('video-bg');

function setupCamera() {
  navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false })
    .then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        video.classList.add('ready');
        tryMediaPipe();
      };
    })
    .catch(err => {
      console.warn('Camera unavailable:', err.message);
      document.getElementById('emotion-badge').textContent = '● NO CAMERA';
    });
}

function tryMediaPipe() {
  if (typeof FaceMesh === 'undefined') {
    console.warn('MediaPipe FaceMesh not loaded');
    return;
  }

  const faceMesh = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${f}`
  });
  faceMesh.setOptions({
    maxNumFaces:          6,
    refineLandmarks:      false,
    minDetectionConfidence: .5,
    minTrackingConfidence:  .5,
  });

  faceMesh.onResults(results => {
    faces = [];
    let smiles = 0;

    if (results.multiFaceLandmarks) {
      for (const lm of results.multiFaceLandmarks) {
        // Mirror x (video CSS is scaleX(-1))
        const fx = (1 - lm[168].x) * W;
        const fy = lm[168].y * H;

        // Smile: mouth width vs inter-eye distance
        const mw = Math.abs(lm[291].x - lm[61].x);
        const ew = Math.abs(lm[263].x - lm[33].x);
        const smile = ew > 0 && (mw / ew) > .57;
        if (smile) smiles++;
        faces.push({ x: fx, y: fy, smile });
      }
    }

    emotion = (smiles > faces.length * .5 && faces.length > 0) ? 'smile' : 'neutral';
    updateEmotionBadge();
  });

  if (typeof Camera !== 'undefined') {
    const cam = new Camera(video, {
      onFrame: async () => { await faceMesh.send({ image: video }); },
      width: 1280, height: 720,
    });
    cam.start().catch(e => console.warn('Camera utils error:', e));
  }
}

function updateEmotionBadge() {
  const el = document.getElementById('emotion-badge');
  if (!faces.length) {
    el.className = '';
    el.textContent = '● FACE TRACKING';
  } else if (emotion === 'smile') {
    el.className = 'smile';
    el.textContent = '✦ SMILE DETECTED';
  } else {
    el.className = '';
    el.textContent = `● ${faces.length} FACE${faces.length>1?'S':''} DETECTED`;
  }
}

setupCamera();

// ── Socket.IO ──────────────────────────────────────────────────────────────────
const socket     = io();
const mbtiCounts = {};

socket.on('state', data => {
  Object.assign(mbtiCounts, data.counts || {});
  renderLegend();
  if (data.session) setSessionName(data.session.name);
});

socket.on('spawn_particles', data => {
  const { mbti, color, counts, total, nickname } = data;
  Object.assign(mbtiCounts, counts || {});
  spawnMBTI(mbti, color);
  renderLegend();
  document.getElementById('total-num').textContent = total || Object.values(mbtiCounts).reduce((a,b)=>a+b,0);
  showToast(`✦ ${mbti} ${nickname} joined`, color);
  if (particles.length > 0) {
    document.getElementById('waiting').style.display = 'none';
  }
});

// When a new session starts, reset the canvas and counts
socket.on('session_reset', data => {
  // Clear all MBTI counts
  for (const k of Object.keys(mbtiCounts)) delete mbtiCounts[k];
  // Remove all MBTI particles (keep ambient)
  for (const mbti of Object.keys(mbtiParticles)) {
    for (const p of mbtiParticles[mbti]) {
      const idx = particles.indexOf(p);
      if (idx !== -1) particles.splice(idx, 1);
    }
    delete mbtiParticles[mbti];
  }
  renderLegend();
  document.getElementById('total-num').textContent = '0';
  document.getElementById('waiting').style.display = '';
  if (data.session) setSessionName(data.session.name);
  showToast('✦ 新场次已开始', '#ffffff');
});

// ── Legend ─────────────────────────────────────────────────────────────────────
(function buildLegend() {
  const root = document.getElementById('legend-rows');
  for (const m of MBTI_ORDER) {
    const c = MBTI_COLORS[m];
    root.insertAdjacentHTML('beforeend', `
      <div class="row" id="r-${m}">
        <div class="dot" style="background:${c};--c:${c}"></div>
        <span class="lbl">${m}</span>
        <div class="track"><div class="fill" id="f-${m}" style="background:${c}"></div></div>
        <span class="cnt" id="c-${m}">0</span>
      </div>`);
  }
})();

function renderLegend() {
  const total = Object.values(mbtiCounts).reduce((a,b)=>a+b,0);
  document.getElementById('total-num').textContent = total;
  for (const m of MBTI_ORDER) {
    const n   = mbtiCounts[m] || 0;
    const pct = total > 0 ? n/total*100 : 0;
    document.getElementById(`r-${m}`)?.classList.toggle('on', n > 0);
    const f = document.getElementById(`f-${m}`);
    const c = document.getElementById(`c-${m}`);
    if (f) f.style.width = pct + '%';
    if (c) c.textContent = n;
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function showToast(msg, color) {
  const ui = document.getElementById('ui');
  ui.querySelectorAll('.toast-wrap').forEach(el => el.remove());
  const wrap = document.createElement('div');
  wrap.className = 'toast-wrap';
  wrap.innerHTML = `<div class="toast-pill" style="border-color:${color}55;text-shadow:0 0 18px ${color}">${msg}</div>`;
  ui.appendChild(wrap);
  setTimeout(() => wrap.remove(), 3000);
}

// ── Ambient particles (separate budget, never pruned by MBTI logic) ───────────
function seedAmbient(n) {
  for (let i = 0; i < n; i++) {
    const col = AMBIENT_COLS[i % AMBIENT_COLS.length];
    const p   = new Particle(Math.random()*W, Math.random()*H, col, null);
    // Override sizeClass: mostly dots, some blobs for visual richness
    if (i < 3) {
      p.sizeClass = 'blob';
      p.size   = 14 + Math.random() * 18;
      p.alphaT = Math.random() * .08 + .04;
      p._sprites = getDotSprite(col);
    } else {
      p.sizeClass = 'dot';
      p.size   = Math.random() * 4 + 1.5;
      p.alphaT = Math.random() * .15 + .05;
    }
    particles.push(p);
  }
}
seedAmbient(25);

// ── Render loop ────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);

  ctx.globalCompositeOperation = 'source-over';

  // 1. Fully opaque dark base — required for 'screen' blend to work correctly
  ctx.fillStyle = '#05050f';
  ctx.fillRect(0, 0, W, H);

  // 2. Camera feed blended on top of the opaque base
  if (video.readyState >= 2) {
    ctx.save();
    ctx.translate(W, 0);
    ctx.scale(-1, 1);
    ctx.globalAlpha = 0.38;
    ctx.drawImage(video, 0, 0, W, H);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // 3. Particles — screen blend works now because background is fully opaque
  ctx.globalCompositeOperation = 'screen';
  for (const p of particles) {
    p.update(faces, emotion);
    p.draw(ctx);
  }
  ctx.globalCompositeOperation = 'source-over';
}

loop();

// ── Session management UI ─────────────────────────────────────────────────────
function setSessionName(name) {
  const el = document.getElementById('session-name');
  el.textContent = name ? `— ${name} —` : '';
}

function openSessionPanel() {
  document.getElementById('session-panel').classList.add('open');
  loadSessionHistory();
}

function closeSessionPanel() {
  document.getElementById('session-panel').classList.remove('open');
}

// Close on backdrop click
document.getElementById('session-panel').addEventListener('click', e => {
  if (e.target === document.getElementById('session-panel')) closeSessionPanel();
});

function createNewSession() {
  const name = document.getElementById('sp-name-input').value.trim();
  if (!confirm(`开始新场次"${name || '新活动'}"？当前数据将存入历史记录。`)) return;

  fetch('/api/sessions/new', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.ok) {
        document.getElementById('sp-name-input').value = '';
        closeSessionPanel();
      }
    })
    .catch(e => alert('请求失败: ' + e.message));
}

function loadSessionHistory() {
  fetch('/api/sessions')
    .then(r => r.json())
    .then(data => {
      const list = document.getElementById('sp-history-list');
      // Update current session name display
      if (data.active) setSessionName(data.active.name);

      if (!data.history || data.history.length === 0) {
        list.innerHTML = '<div style="color:rgba(255,255,255,0.2);font-size:12px;padding:16px 0">暂无历史记录</div>';
        return;
      }
      list.innerHTML = data.history.map(s => {
        const d = new Date(s.createdAt);
        const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        return `
          <div class="sp-row">
            <div class="sp-row-info">
              <div class="sp-row-name">${escHtml(s.name)}</div>
              <div class="sp-row-meta">${dateStr} · ${s.total} 人参与</div>
            </div>
            <button class="sp-btn" onclick="viewSession('${s.id}')">查看</button>
            <button class="sp-btn danger" onclick="deleteSession('${s.id}', this)">删除</button>
          </div>`;
      }).join('');
    })
    .catch(e => console.warn('Failed to load sessions:', e));
}

function viewSession(id) {
  fetch(`/api/sessions/${id}`)
    .then(r => r.json())
    .then(s => {
      const lines = Object.entries(s.counts || {})
        .sort((a, b) => b[1] - a[1])
        .map(([m, n]) => `${m}: ${n}人`)
        .join('\n');
      alert(`${s.name}\n创建: ${new Date(s.createdAt).toLocaleString()}\n总人数: ${s.total}\n\n${lines || '无数据'}`);
    });
}

function deleteSession(id, btn) {
  if (!confirm('确认删除此历史记录？')) return;
  fetch(`/api/sessions/${id}`, { method: 'DELETE' })
    .then(r => r.json())
    .then(d => { if (d.ok) btn.closest('.sp-row').remove(); });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
