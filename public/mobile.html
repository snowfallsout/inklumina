<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Colorfield · Join</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap');

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
}

:root {
  --bg:      #07071a;
  --surface: rgba(255,255,255,0.055);
  --border:  rgba(255,255,255,0.1);
  --text:    rgba(255,255,255,0.9);
  --muted:   rgba(255,255,255,0.38);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
}

/* ── Ambient orbs background ─────────────────── */
.bg-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(70px);
  opacity: 0;
  animation: orbDrift 10s ease-in-out infinite;
}
@keyframes orbDrift {
  0%,100% { transform: translate(0,0); opacity:.13; }
  50%      { transform: translate(18px,-18px); opacity:.22; }
}

/* ── Screens ──────────────────────────────────── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  z-index: 10;
  transition: opacity .5s ease, transform .5s ease;
  will-change: opacity, transform;
}
.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(24px);
}

/* ── Screen 1: Welcome ────────────────────────── */
#s-welcome .title {
  font-size: 38px;
  font-weight: 100;
  letter-spacing: 12px;
  text-transform: uppercase;
  text-shadow: 0 0 60px rgba(255,255,255,.22);
  margin-bottom: 6px;
  text-align: center;
}
#s-welcome .subtitle {
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 64px;
  text-align: center;
}
#s-welcome .desc {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.8;
  text-align: center;
  max-width: 280px;
  margin-bottom: 56px;
}

/* ── Buttons ──────────────────────────────────── */
.btn {
  background: rgba(255,255,255,0.08);
  color: white;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 60px;
  padding: 17px 52px;
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .25s, transform .15s, opacity .25s;
  display: inline-block;
  text-align: center;
  white-space: nowrap;
}
.btn:active { transform: scale(.96); }
.btn:hover  { background: rgba(255,255,255,0.14); }
.btn:disabled {
  opacity: .3;
  cursor: not-allowed;
  pointer-events: none;
}
.btn.accent {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.3);
}

/* ── Screen 2: MBTI Selector ──────────────────── */
#s-mbti h2 {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 28px;
  text-align: center;
}

/* Live MBTI preview */
.preview {
  display: flex;
  gap: 6px;
  margin-bottom: 32px;
  height: 52px;
  align-items: center;
}
.preview-letter {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.2);
  transition: color .3s, text-shadow .3s;
  width: 38px;
  text-align: center;
  line-height: 1;
}
.preview-letter.active {
  color: white;
  text-shadow: 0 0 30px rgba(255,255,255,.4);
}

/* Dimension rows */
.dim-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  width: 100%;
  max-width: 300px;
}
.dim-btn {
  flex: 1;
  padding: 0 8px;
  height: 72px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  color: var(--muted);
  cursor: pointer;
  transition: all .22s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
}
.dim-btn .big  { font-size: 22px; font-weight: 700; }
.dim-btn .hint { font-size: 9px; font-weight: 300; letter-spacing: 1px; opacity: .7; }
.dim-btn:active { transform: scale(.94); }
.dim-btn.sel {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.38);
  color: white;
  box-shadow: 0 0 28px rgba(255,255,255,0.08), inset 0 0 16px rgba(255,255,255,0.04);
}

.submit-row {
  margin-top: 22px;
  width: 100%;
  max-width: 300px;
  display: flex;
  justify-content: center;
}

/* ── Screen 3: Result ──────────────────────────── */
#s-result {
  text-align: center;
  overflow: hidden;
}

/* Full-bg color wash */
#color-wash {
  position: fixed;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease;
  pointer-events: none;
  z-index: 5;
}

.result-inner {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Glowing orb */
.result-orb {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  margin-bottom: 28px;
  opacity: 0;
  transform: scale(.4);
  transition: all .7s cubic-bezier(.34,1.56,.64,1) .2s;
}
.result-orb.show { opacity: 1; transform: scale(1); }

.lucky-label {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.lucky-hex {
  font-size: 20px;
  font-weight: 100;
  letter-spacing: 6px;
  margin-bottom: 36px;
  transition: color .6s;
}

.result-mbti {
  font-size: 50px;
  font-weight: 700;
  letter-spacing: 10px;
  opacity: 0;
  transform: translateY(16px);
  transition: all .6s ease .35s;
  margin-bottom: 6px;
}
.result-mbti.show { opacity:1; transform:translateY(0); }

.result-nick {
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 5px;
  opacity: 0;
  transition: all .6s ease .55s;
  margin-bottom: 48px;
}
.result-nick.show { opacity:.75; }

.look-up {
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--muted);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* Sparkle canvas over result */
#sparkle-cv {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 6;
}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb" style="width:220px;height:220px;background:#9D4EDD;top:5%;left:5%;animation-delay:0s"></div>
  <div class="orb" style="width:160px;height:160px;background:#00F5FF;bottom:20%;right:8%;animation-delay:3s"></div>
  <div class="orb" style="width:130px;height:130px;background:#39FF14;bottom:8%;left:15%;animation-delay:6s"></div>
</div>

<!-- Screen 1: Welcome -->
<div id="s-welcome" class="screen">
  <div class="title">Colorfield</div>
  <div class="subtitle">MBTI · Particle Art · Live</div>
  <div class="desc">
    你的 MBTI 将化作一簇专属色彩的粒子<br>汇入现场大屏的流体画布
  </div>
  <button class="btn accent" onclick="goTo('mbti')">开始加入 →</button>
</div>

<!-- Screen 2: MBTI Input -->
<div id="s-mbti" class="screen hidden">
  <h2>选择你的 MBTI 类型</h2>

  <div class="preview" id="preview">
    <div class="preview-letter" id="pl-0">_</div>
    <div class="preview-letter" id="pl-1">_</div>
    <div class="preview-letter" id="pl-2">_</div>
    <div class="preview-letter" id="pl-3">_</div>
  </div>

  <div class="dim-row">
    <button class="dim-btn" data-d="0" data-v="E" onclick="pick(0,'E',this)">
      <span class="big">E</span><span class="hint">Extrovert</span>
    </button>
    <button class="dim-btn" data-d="0" data-v="I" onclick="pick(0,'I',this)">
      <span class="big">I</span><span class="hint">Introvert</span>
    </button>
  </div>

  <div class="dim-row">
    <button class="dim-btn" data-d="1" data-v="N" onclick="pick(1,'N',this)">
      <span class="big">N</span><span class="hint">Intuitive</span>
    </button>
    <button class="dim-btn" data-d="1" data-v="S" onclick="pick(1,'S',this)">
      <span class="big">S</span><span class="hint">Sensing</span>
    </button>
  </div>

  <div class="dim-row">
    <button class="dim-btn" data-d="2" data-v="T" onclick="pick(2,'T',this)">
      <span class="big">T</span><span class="hint">Thinking</span>
    </button>
    <button class="dim-btn" data-d="2" data-v="F" onclick="pick(2,'F',this)">
      <span class="big">F</span><span class="hint">Feeling</span>
    </button>
  </div>

  <div class="dim-row">
    <button class="dim-btn" data-d="3" data-v="J" onclick="pick(3,'J',this)">
      <span class="big">J</span><span class="hint">Judging</span>
    </button>
    <button class="dim-btn" data-d="3" data-v="P" onclick="pick(3,'P',this)">
      <span class="big">P</span><span class="hint">Perceiving</span>
    </button>
  </div>

  <div class="submit-row">
    <button class="btn" id="submit-btn" disabled onclick="submitMBTI()">
      加入画布
    </button>
  </div>
</div>

<!-- Screen 3: Result -->
<div id="s-result" class="screen hidden">
  <canvas id="sparkle-cv"></canvas>
  <div id="color-wash"></div>
  <div class="result-inner">
    <div class="lucky-label">Today's Lucky Color</div>
    <div class="result-orb" id="r-orb"></div>
    <div class="lucky-hex" id="r-hex">#------</div>
    <div class="result-mbti" id="r-mbti">----</div>
    <div class="result-nick" id="r-nick">------</div>
    <div class="look-up">↑ 抬头看大屏幕</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';

const MBTI_COLORS = {
  INTJ:'#9D4EDD', INTP:'#00F5FF', ENTJ:'#FF073A', ENTP:'#FF6B00',
  INFJ:'#CC00FF', INFP:'#FF1493', ENFJ:'#FFD700', ENFP:'#39FF14',
  ISTJ:'#1E90FF', ISFJ:'#00FFCD', ESTJ:'#FF4500', ESFJ:'#FF69B4',
  ISTP:'#B8C0FF', ISFP:'#E040FB', ESTP:'#FFE600', ESFP:'#FF6EC7',
};
const MBTI_NAMES = {
  INTJ:'战略家', INTP:'逻辑学家', ENTJ:'指挥官', ENTP:'辩论家',
  INFJ:'提倡者', INFP:'调停者', ENFJ:'主人公', ENFP:'竞选者',
  ISTJ:'检察官', ISFJ:'守护者', ESTJ:'总经理', ESFJ:'执政官',
  ISTP:'鉴赏家', ISFP:'探险家', ESTP:'企业家', ESFP:'表演者',
};

// ── Navigation ─────────────────────────────────────────────────────────────────
function goTo(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(`s-${name}`).classList.remove('hidden');
}

// ── MBTI selection ─────────────────────────────────────────────────────────────
const sel = [null, null, null, null];

function pick(dim, val, btn) {
  document.querySelectorAll(`[data-d="${dim}"]`).forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  sel[dim] = val;

  // Update preview letters
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById(`pl-${i}`);
    el.textContent = sel[i] || '_';
    el.classList.toggle('active', sel[i] !== null);
  }

  // Tint submit button with partial MBTI color if 3/4 chosen
  const complete = sel.every(Boolean);
  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = !complete;
  if (complete) {
    const c = MBTI_COLORS[sel.join('')] || 'rgba(255,255,255,0.18)';
    submitBtn.style.borderColor = c + '88';
    submitBtn.style.boxShadow   = `0 0 30px ${c}33`;
  }
}

// ── Submit ─────────────────────────────────────────────────────────────────────
const socket = io();

function submitMBTI() {
  if (!sel.every(Boolean)) return;
  const mbti = sel.join('');
  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled  = true;
  submitBtn.textContent = '发送中…';
  socket.emit('submit_mbti', { mbti });
}

socket.on('lucky_color', ({ mbti, color, nickname, luckyPhrase }) => {
  showResult(mbti, color, nickname || MBTI_NAMES[mbti], luckyPhrase);
});

// ── Result screen ──────────────────────────────────────────────────────────────
function showResult(mbti, color, nickname, phrase) {
  goTo('result');

  const orb   = document.getElementById('r-orb');
  const hex   = document.getElementById('r-hex');
  const badge = document.getElementById('r-mbti');
  const nick  = document.getElementById('r-nick');
  const wash  = document.getElementById('color-wash');

  orb.style.background  = color;
  orb.style.boxShadow   = `0 0 80px ${color}, 0 0 160px ${color}55`;
  hex.textContent        = color;
  hex.style.color        = color;
  badge.textContent      = mbti;
  badge.style.color      = color;
  badge.style.textShadow = `0 0 50px ${color}`;
  nick.textContent       = `${nickname}${phrase ? ' · ' + phrase : ''}`;
  wash.style.background  = `radial-gradient(ellipse at 50% 65%, ${color}28 0%, transparent 65%)`;

  // Animate in
  requestAnimationFrame(() => {
    wash.style.opacity = '1';
    setTimeout(() => orb.classList.add('show'),   80);
    setTimeout(() => badge.classList.add('show'), 250);
    setTimeout(() => nick.classList.add('show'),  450);
  });

  startSparkles(color);
}

// ── Sparkle canvas ─────────────────────────────────────────────────────────────
function startSparkles(color) {
  const cv  = document.getElementById('sparkle-cv');
  cv.width  = window.innerWidth;
  cv.height = window.innerHeight;
  const ctx = cv.getContext('2d');

  const N = 40;
  const stars = Array.from({ length: N }, () => ({
    x:     Math.random() * cv.width,
    y:     Math.random() * cv.height,
    size:  Math.random() * 2.5 + .8,
    spd:   Math.random() * .018 + .004,
    phase: Math.random() * Math.PI * 2,
  }));

  let t = 0;
  (function draw() {
    if (!document.getElementById('s-result').classList.contains('hidden')) {
      requestAnimationFrame(draw);
    }
    ctx.clearRect(0, 0, cv.width, cv.height);
    t++;
    for (const s of stars) {
      const a = (Math.sin(t * s.spd + s.phase) + 1) / 2;
      const arm = s.size * 3.5;
      ctx.globalAlpha  = a * .9;
      ctx.strokeStyle  = color;
      ctx.lineWidth    = 1;
      ctx.shadowBlur   = 6;
      ctx.shadowColor  = color;
      ctx.beginPath();
      ctx.moveTo(s.x - arm, s.y); ctx.lineTo(s.x + arm, s.y);
      ctx.moveTo(s.x, s.y - arm); ctx.lineTo(s.x, s.y + arm);
      const d = arm * .55;
      ctx.moveTo(s.x - d, s.y - d); ctx.lineTo(s.x + d, s.y + d);
      ctx.moveTo(s.x + d, s.y - d); ctx.lineTo(s.x - d, s.y + d);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;
  })();
}

// Color preview animation when buttons selected (tint orbs)
function tintOrbs(color) {
  document.querySelectorAll('.orb').forEach(o => {
    o.style.transition = 'background .6s';
    o.style.background = color || '';
  });
}
</script>
</body>
</html>
